<!DOCTYPE html>
<html lang="en">
<head>
  <title>Slot Machine | Online Casino Game</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/main.css">
  <script>
    const gameSession = {
      sessionId: null,
      playerId: null,
      currency: null,
      cash: null,
      bonus: null
    };
    var slotMachineConfig = {};
  </script>
  <style>
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      background-color: #05020f;
    }
    #slot-machine {
      flex: 1 1 auto;
      min-height: 0;
    }
    #game-error {
      max-width: 36rem;
      margin: auto;
      padding: 1.5rem;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 1.1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="game-error" role="alert" hidden></div>
  <div id="slot-machine" hidden></div>
  <script>
    (async function initializeGame() {
      const gameContainer = document.getElementById("slot-machine");
      const errorContainer = document.getElementById("game-error");
      const sessionId = new URLSearchParams(window.location.search).get("sessionId");

      function showError(message) {
        gameContainer.hidden = true;
        errorContainer.textContent = message;
        errorContainer.hidden = false;
      }

      errorContainer.textContent = "Loading game session...";
      errorContainer.hidden = false;

      if (!sessionId) {
        showError("Unable to launch game: sessionId is required.");
        return;
      }

      try {
        const response = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}`, {
          headers: { Accept: "application/json" }
        });

        if (!response.ok) {
          showError("Unable to launch game: session is invalid.");
          return;
        }

        const session = await response.json();
        if (session.status !== "ACTIVE") {
          showError("Unable to launch game: session is not active.");
          return;
        }

        const authenticateResponse = await fetch(
          `/api/sessions/${encodeURIComponent(sessionId)}/authenticate`,
          {
            method: "POST",
            headers: { Accept: "application/json" }
          }
        );

        if (!authenticateResponse.ok) {
          showError("Unable to launch game: authentication failed.");
          return;
        }

        const authenticatedSession = await authenticateResponse.json();
        if (!authenticatedSession.currency || !Number.isFinite(authenticatedSession.cash)) {
          showError("Unable to launch game: invalid balance data.");
          return;
        }

        Object.assign(gameSession, {
          sessionId: authenticatedSession.sessionId,
          playerId: authenticatedSession.playerId,
          currency: authenticatedSession.currency,
          cash: authenticatedSession.cash,
          bonus: authenticatedSession.bonus
        });

        slotMachineConfig.balance = gameSession.cash;
        slotMachineConfig.textStrings = {
          Balance: `Balance (${gameSession.currency})`
        };

        // Demo spins keep this operator balance unchanged until Bet and Result are connected.
        errorContainer.hidden = true;

        gameContainer.hidden = false;

        const gameScript = document.createElement("script");
        gameScript.src = "assets/js/main.js?v=operator-wallet-balance";
        gameScript.onerror = () => {
          showError("Unable to launch game: game assets could not be loaded.");
        };
        document.head.appendChild(gameScript);
      } catch (error) {
        showError("Unable to launch game: session could not be verified.");
      }
    })();
  </script>
</body>
</html>
